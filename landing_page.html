<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Business</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Our Trading Bot!</h1>
        <p>Automate your trading with our advanced algorithms designed for success.</p>
        <a href="#signup" class="cta">Get Started</a>
    </header>
    <section id="features">
        <h2>Features</h2>
        <ul>
            <li>Automated Trading Strategies</li>
            <li>User-Friendly Interface</li>
            <li>Real-Time Analytics</li>
            <li>Secure Transactions</li>
        </ul>
    </section>
    <section id="signup">
        <h2>Sign Up Now!</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
            <button type="submit">Join Us</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 Trading Bot Business. All rights reserved.</p>
    </footer>
